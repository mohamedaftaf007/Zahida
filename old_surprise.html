<!DOCTYPE html>
<html>
<head>
    <title>Surprise ❤️</title>
    <style>
        /* Full screen background */
        body {
            margin: 0;
            height: 100vh;
            background: url("zahi.jpeg") center/cover no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        /* Birthday text */
        h1 {
            font-size: 60px;
            color: white;
            text-shadow: 0 0 20px pink, 0 0 30px red;
            animation: glow 1.5s infinite alternate;
            z-index: 2;
            text-align: center;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px white, 0 0 20px pink; }
            to { text-shadow: 0 0 30px red, 0 0 40px yellow; }
        }

        /* Confetti */
        .confetti {
            position: absolute;
            width: 10px; height: 10px;
            top: -10px;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); }
        }

        /* Floating hearts */
        .heart {
            position: absolute;
            width: 20px;
            height: 20px;
            background: red;
            clip-path: polygon(50% 0%, 61% 9%, 68% 25%, 50% 100%, 32% 25%, 39% 9%);
            animation: float 5s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh) scale(0.5) rotate(0deg); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-50px) scale(1) rotate(360deg); opacity: 0; }
        }

        /* Bloom effect (circle glow) */
        .bloom {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, transparent 70%);
            animation: bloomAnim 2s ease-in-out infinite;
        }

        @keyframes bloomAnim {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(0); opacity: 0; }
        }



        /* Confetti container */
        #confetti-container { position: fixed; width: 100%; height: 100%; pointer-events: none; top: 0; left: 0; }
    </style>
</head>
<body>

    <h1>🎉 Happy Birthday Rey ❣️ 🎉</h1>

    <!-- Pop-up cake -->
    <img src=class="cake">

    <!-- Confetti -->
    <div id="confetti-container"></div>

<script>
/* Confetti */
for (let i = 0; i < 100; i++) {
    let confetti = document.createElement("div");
    confetti.classList.add("confetti");
    confetti.style.left = Math.random() * 100 + "vw";
    confetti.style.backgroundColor = ["red","yellow","blue","pink","cyan","lime"][Math.floor(Math.random()*6)];
    confetti.style.animationDuration = (Math.random()*3 + 2) + "s";
    document.getElementById("confetti-container").appendChild(confetti);
}

/* Floating hearts */
for (let i = 0; i < 20; i++) {
    let heart = document.createElement("div");
    heart.classList.add("heart");
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random()*5 + 3) + "s";
    heart.style.animationDelay = Math.random() * 5 + "s";
    document.body.appendChild(heart);
}

/* Bloom effect */
for (let i = 0; i < 10; i++) {
    let bloom = document.createElement("div");
    bloom.classList.add("bloom");
    bloom.style.left = Math.random() * 100 + "vw";
    bloom.style.top = Math.random() * 80 + "vh";
    bloom.style.animationDelay = Math.random() * 2 + "s";
    document.body.appendChild(bloom);
}
</script>

</body>
</html>
